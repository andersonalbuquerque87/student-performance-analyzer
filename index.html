<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Desempenho Acadêmico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOAST -->
<div id="toast-container"></div>

<!-- HEADER -->
<div class="page-header">
  <h2>📊 Desempenho Acadêmico — AWS re/Start</h2>
  <button class="btn-dark-toggle" onclick="toggleDarkMode()">🌙</button>
</div>

<!-- UPLOAD -->
<div class="upload-card">
  <label class="upload-label" for="fileInput">📁 Selecione o arquivo CSV</label>
  <div class="upload-row">
    <input type="file" id="fileInput" accept=".csv">
    <button onclick="handleFile()">Processar</button>
    <button class="btn-secondary" onclick="exportarCSV()">⬇️ Exportar CSV</button>
    <button class="btn-secondary" onclick="mostrarHistorico()">🕓 Histórico</button>
  </div>
  <div id="progresso-container">
    <div id="progresso"></div>
  </div>
  <p id="status"></p>
</div>

<!-- CONTADORES + PESQUISA -->
<div class="header-row">
  <div class="top-bar">
    <span id="count-all"       onclick="filterTable('all')"       title="Todos">🔎 0</span>
    <span id="count-graduated" onclick="filterTable('graduated')" title="Graduados">🎓 0</span>
    <span id="count-red"       onclick="filterTable('red')"       title="Críticos">🔴 0</span>
    <span id="count-yellow"    onclick="filterTable('yellow')"    title="Atenção">🟡 0</span>
    <span id="count-green"     onclick="filterTable('green')"     title="OK">🟢 0</span>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="Buscar aluno ou e-mail..." onkeyup="searchTable()">
  </div>
</div>

<!-- AÇÕES -->
<div class="actions">
  <button onclick="mostrarAreaCopia()">📋 Copiar Desempenho em Massa</button>
  <button class="btn-danger"  onclick="enviarParaTodos('red')">📧 Enviar para Críticos</button>
  <button class="btn-warning" onclick="enviarParaTodos('yellow')">📧 Enviar para Atenção</button>
</div>

<!-- ÁREA DE CÓPIA -->
<div id="area-copia" style="display:none;">
  <textarea id="lista-emails" rows="8" placeholder="Cole os e-mails aqui (um por linha)"></textarea>
  <br><br>
  <button onclick="copiarDesempenhoOrdenado()">📋 Copiar para Área de Transferência</button>
</div>

<!-- GRÁFICOS -->
<div id="graficos-container" style="display:none;">
  <div class="graficos-grid">
    <div class="grafico-card">
      <h3>📊 Status dos Alunos</h3>
      <canvas id="grafico-status"></canvas>
    </div>
    <div class="grafico-card">
      <h3>📈 Média da Turma</h3>
      <canvas id="grafico-media"></canvas>
    </div>
  </div>
</div>

<!-- TABELA -->
<div class="table-wrapper">
  <table id="table">
    <thead>
      <tr>
        <th>#</th>
        <th onclick="sortTable('name')">Aluno ⬍</th>
        <th onclick="sortTable('total')">Progresso ⬍</th>
        <th onclick="sortTable('total')">Total ⬍</th>
        <th onclick="sortTable('lab')">Lab ⬍</th>
        <th onclick="sortTable('kc')">kc ⬍</th>
        <th>Status</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- RODAPÉ -->
<footer class="footer">
  <div class="footer-copyright">
    © 2025-2026 Todos os direitos reservados.
  </div>
  <div class="footer-devs">
    <a class="dev-link" href="https://www.linkedin.com/in/anderson-garcia-albuquerque/" target="_blank">
      <div class="dev-card">
        <img class="dev-avatar" src="assets/anderson-albuquerque.jpg" alt="Anderson">
        <span class="dev-name">Anderson Albuquerque</span>
      </div>
    </a>
    <a class="dev-link" href="https://www.linkedin.com/in/brianrichard1/" target="_blank">
      <div class="dev-card">
        <img class="dev-avatar" src="assets/brian-richard.jpg" alt="Brian">
        <span class="dev-name">Brian Richard</span>
      </div>
    </a>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.2.0/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
